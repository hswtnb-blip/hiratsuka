<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平塚 海況チェッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {

    --deep: #0d2137;
    --wave: #1a4a7a;
    --foam: #4a9eca;
    --sky: #7ec8e3;
    --go: #2ecc71;
    --warn: #f39c12;
    --stop: #e74c3c;
    --text: #e8f4fd;
    --muted: #7fb3cc;

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--ocean); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; bottom:0; left:0; right:0; height:200px; background:linear-gradient(180deg,transparent,var(--wave) 60%,var(--deep)); opacity:0.4; animation:wavePulse 4s ease-in-out infinite; pointer-events:none; z-index:0; }

  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  header { text-align:center; margin-bottom:28px; padding-top:16px; }
  .title { font-family:'Bebas Neue',cursive; font-size:52px; letter-spacing:4px; color:var(--sky); line-height:1; text-shadow:0 0 30px rgba(126,200,227,0.5); }
  .subtitle { font-size:12px; color:var(--muted); letter-spacing:3px; margin-top:4px; }

  .verdict-card.warn { background:linear-gradient(135deg,rgba(243,156,18,0.15),rgba(243,156,18,0.05)); border-color:rgba(243,156,18,0.4); box-shadow:0 0 40px rgba(243,156,18,0.15); }
  .verdict-card.stop { background:linear-gradient(135deg,rgba(231,76,60,0.15),rgba(231,76,60,0.05)); border-color:rgba(231,76,60,0.4); box-shadow:0 0 40px rgba(231,76,60,0.15); }
  .verdict-card.loading { background:linear-gradient(135deg,rgba(74,158,202,0.1),rgba(74,158,202,0.05)); border-color:rgba(74,158,202,0.3); }
  .verdict-emoji { font-size:60px; display:block; margin-bottom:10px; animation:float 3s ease-in-out infinite; }
  .verdict-text { font-family:'Bebas Neue',cursive; font-size:34px; letter-spacing:3px; margin-bottom:4px; }
  .verdict-text.go{color:var(--go)} .verdict-text.warn{color:var(--warn)} .verdict-text.stop{color:var(--stop)}
  .verdict-sub { font-size:13px; color:var(--muted); line-height:1.6; }
  .data-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .data-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:18px 14px; text-align:center; }
  .data-card.full-width { grid-column:1/-1; }
  .data-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .data-value { font-family:'Bebas Neue',cursive; font-size:40px; line-height:1; color:var(--sky); }
  .data-unit { font-size:13px; color:var(--muted); margin-top:2px; }
  .weather-icon { font-size:44px; display:block; margin-bottom:4px; }
  .weather-desc { font-size:13px; color:var(--muted); }
  .wind-direction-display { display:flex; align-items:center; justify-content:center; gap:12px; margin-top:4px; }
  .compass { width:56px; height:56px; }
  .compass svg { width:100%; height:100%; }
  .direction-name { font-family:'Bebas Neue',cursive; font-size:34px; color:var(--sky); }
  .section { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:18px; margin-bottom:20px; }
  .section-title { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
  .tide-row { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
  .tide-row:last-child { border-bottom:none; }
  .tide-row.past { opacity:0.35; }
  .tide-row.next { background:rgba(126,200,227,0.07); border-radius:10px; padding:9px 8px; margin:0 -8px; }
  .tide-time { font-family:'Bebas Neue',cursive; font-size:22px; width:70px; display:flex; align-items:center; gap:5px; }
  .next-badge { font-size:10px; background:var(--foam); color:var(--ocean); border-radius:4px; padding:1px 5px; font-family:'Noto Sans JP',sans-serif; font-weight:700; }
  .tide-type { font-size:13px; font-weight:700; flex:1; text-align:center; }
  .tide-type.high{color:var(--foam)} .tide-type.low{color:var(--muted)}
  .tide-height { font-family:'Bebas Neue',cursive; font-size:24px; color:var(--sky); }
  .tide-unit { font-size:12px; color:var(--muted); }
  .tap-hint { font-size:10px; color:var(--muted); text-align:right; margin-bottom:8px; opacity:0.7; }
  .forecast-row { display:flex; align-items:center; padding:11px 10px; border-radius:12px; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:background 0.2s; gap:8px; }
  .forecast-row:last-child { border-bottom:none; }
  .forecast-row:active, .forecast-row.active { background:rgba(126,200,227,0.1); }
  .forecast-day { font-size:13px; color:var(--text); width:52px; flex-shrink:0; line-height:1.4; }
  .forecast-day span { display:block; font-size:10px; color:var(--muted); }
  .forecast-icon { font-size:20px; flex-shrink:0; }
  .forecast-winds { flex:1; text-align:center; }
  .wind-range { font-family:'Bebas Neue',cursive; font-size:15px; white-space:nowrap; }
  .wind-min{color:var(--go)} .wind-max{color:var(--warn)}
  .wind-range-label { font-size:9px; color:var(--muted); margin-top:1px; }
  .forecast-badge { font-size:10px; padding:3px 7px; border-radius:20px; font-weight:700; letter-spacing:1px; flex-shrink:0; }
  .badge-go{background:rgba(46,204,113,0.2);color:var(--go);border:1px solid rgba(46,204,113,0.3)}
  .badge-warn{background:rgba(243,156,18,0.2);color:var(--warn);border:1px solid rgba(243,156,18,0.3)}
  .badge-stop{background:rgba(231,76,60,0.2);color:var(--stop);border:1px solid rgba(231,76,60,0.3)}
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px); }
  .modal-overlay.open { display:flex; }
  .modal { background:linear-gradient(180deg,#0d2137,#0a1628); border:1px solid rgba(126,200,227,0.2); border-radius:24px 24px 0 0; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; padding:24px 20px 40px; animation:slideUp 0.3s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .modal-title { font-family:'Bebas Neue',cursive; font-size:28px; color:var(--sky); letter-spacing:2px; }
  .modal-close { font-size:20px; cursor:pointer; color:var(--muted); background:rgba(255,255,255,0.08); border:none; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
  .modal-section-title { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin:16px 0 10px; }
  .hourly-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .hourly-item { background:rgba(255,255,255,0.05); border-radius:10px; padding:8px 4px; text-align:center; }
  .hourly-item.ok{border:1px solid rgba(46,204,113,0.35)}
  .hourly-item.caution{border:1px solid rgba(243,156,18,0.35)}
  .hourly-item.ng{border:1px solid rgba(231,76,60,0.35)}
  .hourly-time { font-size:10px; color:var(--muted); margin-bottom:3px; }
  .hourly-wind { font-family:'Bebas Neue',cursive; font-size:18px; }
  .hourly-wind.ok{color:var(--go)} .hourly-wind.caution{color:var(--warn)} .hourly-wind.ng{color:var(--stop)}
  .refresh-btn { width:100%; background:linear-gradient(135deg,var(--wave),var(--foam)); border:none; border-radius:14px; padding:16px; color:white; font-family:'Bebas Neue',cursive; font-size:20px; letter-spacing:3px; cursor:pointer; transition:all 0.3s; box-shadow:0 4px 20px rgba(74,158,202,0.3); }
  .refresh-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(74,158,202,0.4); }
  .last-update { text-align:center; font-size:11px; color:var(--muted); margin-top:12px; letter-spacing:1px; }
  .loading-dots::after { content:''; animation:dots 1.5s infinite; }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }
  .skeleton { background:linear-gradient(90deg,rgba(255,255,255,0.05) 25%,rgba(255,255,255,0.1) 50%,rgba(255,255,255,0.05) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; height:38px; width:80%; margin:0 auto; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .error-msg { text-align:center; color:var(--stop); font-size:13px; padding:12px; }
</style>
</head>

<div class="container">

      <div class="wind-direction-display">
        <div class="compass">

            <g id="compassArrow" transform="rotate(0,30,30)">
              <polygon points="30,8 33,30 30,26 27,30" fill="var(--stop)"/>
              <polygon points="30,52 33,30 30,34 27,30" fill="var(--sky)"/>
            </g>
          </svg>
        </div>
        <div class="direction-name" id="windDir">--</div>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">🌊 本日の潮汐</div>
    <div id="tideList"><div style="text-align:center;color:var(--muted);font-size:13px;padding:16px;">計算中...</div></div>
  </div>
  <div class="section">
    <div class="section-title">📅 週間予報</div>
    <div class="tap-hint">👆 日付をタップ → 時間別詳細</div>
    <div id="forecastList"><div style="text-align:center;color:var(--muted);font-size:13px;padding:16px;">読み込み中<span class="loading-dots"></span></div></div>
  </div>
  <button class="refresh-btn" onclick="fetchWeather()">🔄 データ更新</button>
  <div class="last-update" id="lastUpdate">--</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">詳細</div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

function todayKey(){return dk(new Date())}
function wClass(s){return s<=3?'ok':s<=6?'caution':'ng'}
function waveJudge(h) {
  if(h<=0.5) return {cls:'go',label:'穏やか',icon:'🌊'};
  if(h<=1.0) return {cls:'warn',label:'やや波あり',icon:'🌊'};

}

function combinedJudge(wind, wave) {
  // 風速・波高どちらか悪い方で判定
  const wj = wJudge(wind);
  const vj = waveJudge(wave);
  const rank = {go:0, warn:1, stop:2};
  if(rank[vj.cls] > rank[wj.cls]) {
    return {cls:vj.cls, badge:'badge-'+vj.cls, label: vj.cls==='stop'?'出航NG':vj.cls==='warn'?'要判断':'出航OK',
      emoji: vj.cls==='stop'?'🚫':vj.cls==='warn'?'🤔':'⛵',
      text: vj.cls==='stop'?'出航NG':vj.cls==='warn'?'要注意':'出航OK！',
      sub: `風速${wind.toFixed(1)}m/s・波高${wave.toFixed(1)}m — ${vj.cls==='stop'?'高波警報！今日は陸でのんびりしましょう。':'波がやや高め。経験と判断次第です。'}`};
  }
  return {...wj, sub: `風速${wind.toFixed(1)}m/s・波高${wave.toFixed(1)}m — ${wj.cls==='go'?'凪いでます。最高の一日を！':wj.cls==='warn'?'やや風あり。経験と判断次第です。':'今日は陸でのんびりしましょう。'}`};
}


  if(s<=3)return{cls:'go',badge:'badge-go',label:'出航OK',emoji:'⛵',text:'出航OK！',sub:`風速${s.toFixed(1)}m/s — 凪いでます。最高の一日を！`};
  if(s<=6)return{cls:'warn',badge:'badge-warn',label:'要判断',emoji:'🤔',text:'要注意',sub:`風速${s.toFixed(1)}m/s — やや風あり。経験と判断次第です。`};
  return{cls:'stop',badge:'badge-stop',label:'出航NG',emoji:'🚫',text:'出航NG',sub:`風速${s.toFixed(1)}m/s — 今日は陸でのんびりしましょう。`};
}

function renderTodayTides(){
  const key=todayKey(), tides=TIDES[key], el=document.getElementById('tideList');
  if(!tides){el.innerHTML='<div class="error-msg">潮汐データなし（3月のみ対応）</div>';return;}
  const now=new Date(), nowMin=now.getHours()*60+now.getMinutes();
  let next=null;
  for(const t of tides){const[h,m]=t.t.split(':').map(Number);if(h*60+m>nowMin){next=t;break;}}
  el.innerHTML=tides.map(tide=>{
    const[h,m]=tide.t.split(':').map(Number),tMin=h*60+m;
    const past=tMin<nowMin,isNext=next&&tide.t===next.t,hi=tide.y==='high';
    return `<div class="tide-row ${past?'past':''} ${isNext?'next':''}">
      <div class="tide-time">${tide.t}${isNext?'<span class="next-badge">次</span>':''}</div>
      <div class="tide-type ${hi?'high':'low'}">${hi?'▲ 満潮':'▽ 干潮'}</div>
      <div class="tide-height">${tide.h.toFixed(1)}<span class="tide-unit">m</span></div>
    </div>`;
  }).join('');
}

function openDetail(dateStr,label){
  document.getElementById('modalTitle').textContent=label;
  let html='';

  // 時間別風速
  const hourly=hourlyCache[dateStr];
  if(hourly&&hourly.length){
    html+=`<div class="modal-section-title">💨 時間ごとの風速</div><div class="hourly-grid">`;
    html+=hourly.map(item=>{
      const cls=wClass(item.w), w=WMO[item.c]||['🌡️',''];
      return `<div class="hourly-item ${cls}">
        <div class="hourly-time">${item.h}時</div>
        <div style="font-size:14px">${w[0]}</div>
        <div class="hourly-wind ${cls}">${item.w.toFixed(1)}</div>
        <div style="font-size:9px;color:var(--muted)">m/s</div>
      </div>`;
    }).join('');
    html+='</div>';
  } else {
    html+='<div class="modal-section-title">💨 時間ごとの風速</div><div class="error-msg">データなし</div>';
  }

  // 潮汐
  const tides=TIDES[dateStr];
  if(tides){
    html+='<div class="modal-section-title">🌊 潮汐</div>';
    html+=tides.map(tide=>{
      const hi=tide.y==='high';
      return `<div class="tide-row">
        <div class="tide-time">${tide.t}</div>
        <div class="tide-type ${hi?'high':'low'}">${hi?'▲ 満潮':'▽ 干潮'}</div>
        <div class="tide-height">${tide.h.toFixed(1)}<span class="tide-unit">m</span></div>
      </div>`;
    }).join('');
  } else {
    html+='<div class="modal-section-title">🌊 潮汐</div><div class="error-msg">潮汐データなし（3月のみ対応）</div>';
  }

  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
}

function selectDay(el,dateStr,label){
  document.querySelectorAll('.forecast-row.active').forEach(r=>r.classList.remove('active'));
  el.classList.add('active');
  openDetail(dateStr,label);
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.querySelectorAll('.forecast-row.active').forEach(r=>r.classList.remove('active'));
}

async function fetchWeather(){
  const btn=document.querySelector('.refresh-btn');
  btn.disabled=true; btn.textContent='取得中...';
  const now=new Date();
  try{
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=wind_speed_10m,wind_direction_10m,weather_code,wave_height&hourly=wind_speed_10m,wind_direction_10m,weather_code,wave_height&wind_speed_unit=ms&forecast_days=7&timezone=Asia%2FTokyo`);
    if(!res.ok)throw new Error();
    const data=await res.json();
    const cur=data.current;
    const waveH = cur.wave_height ?? 0;
    const j=combinedJudge(cur.wind_speed_10m, waveH);
    const dirIdx=Math.round(cur.wind_direction_10m/22.5)%16;
    const w=WMO[cur.weather_code]||['🌡️','不明'];
    const wv=waveJudge(waveH);

    document.getElementById('verdictCard').className=`verdict-card ${j.cls}`;
    document.getElementById('verdictEmoji').textContent=j.emoji;
    const vt=document.getElementById('verdictText'); vt.textContent=j.text; vt.className=`verdict-text ${j.cls}`;
    document.getElementById('verdictSub').textContent=j.sub;
    document.getElementById('windSpeed').textContent=cur.wind_speed_10m.toFixed(1);
    document.getElementById('weatherIcon').textContent=w[0];
    document.getElementById('weatherDesc').textContent=w[1];
    document.getElementById('compassArrow').setAttribute('transform',`rotate(${cur.wind_direction_10m},30,30)`);
    document.getElementById('windDir').textContent=WIND_DIR_JP[dirIdx];
    document.getElementById('waveHeight').textContent=waveH.toFixed(1);
    document.getElementById('waveIcon').textContent=wv.icon;
    document.getElementById('waveDesc').textContent=wv.label;

    // 時間別キャッシュ
    hourlyCache={};
    const ht=data.hourly.time, hw=data.hourly.wind_speed_10m, hc=data.hourly.weather_code;
    for(let i=0;i<ht.length;i++){
      const t=new Date(ht[i]), d=dk(t);
      if(!hourlyCache[d])hourlyCache[d]=[];
      hourlyCache[d].push({h:t.getHours(),w:hw[i],c:hc[i]});
    }

    // 週間予報
    const dayMap={};
    for(let i=0;i<ht.length;i++){
      const t=new Date(ht[i]), d=dk(t);
      if(!dayMap[d])dayMap[d]={date:t,winds:[],codes:[]};
      dayMap[d].winds.push(hw[i]); dayMap[d].codes.push(hc[i]);
    }

    const fHtml=Object.entries(dayMap).map(([d,val])=>{
      const minW=Math.min(...val.winds), maxW=Math.max(...val.winds);
      const domC=val.codes.sort((a,b)=>val.codes.filter(v=>v===b).length-val.codes.filter(v=>v===a).length)[0];
      const ww=WMO[domC]||['🌡️',''];
      const jj=wJudge(maxW), dd=val.date;
      const isToday=d===todayKey();
      const dow=isToday?'今日':DAYS_JP[dd.getDay()]+'曜';
      const label=`${dd.getMonth()+1}/${dd.getDate()}（${dow}）`;
      return `<div class="forecast-row" onclick="selectDay(this,'${d}','${label}')">
        <div class="forecast-day">${dd.getMonth()+1}/${dd.getDate()}<span>${dow}</span></div>
        <div class="forecast-icon">${ww[0]}</div>
        <div class="forecast-winds">
          <div class="wind-range"><span class="wind-min">${minW.toFixed(1)}</span><span style="color:var(--muted);font-size:11px"> ～ </span><span class="wind-max">${maxW.toFixed(1)} m/s</span></div>
          <div class="wind-range-label">最小 ～ 最大</div>
        </div>
        <div class="forecast-badge ${jj.badge}">${jj.label}</div>
      </div>`;
    }).join('');

    document.getElementById('forecastList').innerHTML=fHtml||'<div class="error-msg">予報データなし</div>';
    document.getElementById('lastUpdate').textContent=`最終更新: ${now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){
    document.getElementById('verdictCard').className='verdict-card stop';
    document.getElementById('verdictEmoji').textContent='⚠️';
    const vt=document.getElementById('verdictText'); vt.textContent='取得エラー'; vt.style.color='var(--stop)';
    document.getElementById('verdictSub').textContent='データの取得に失敗しました。通信環境を確認してください。';
    document.getElementById('forecastList').innerHTML='<div class="error-msg">予報データを取得できませんでした</div>';
  }
  btn.disabled=false; btn.textContent='🔄 データ更新';
}

fetchWeather();
renderTodayTides();
setInterval(fetchWeather,10*60*1000);
</script>
