<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海況チェッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{--ocean:#0a1628;--wave:#1a4a7a;--foam:#4a9eca;--sky:#7ec8e3;--text:#e8f4fd;--muted:#7fb3cc}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--ocean);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh}
  body::before{content:'';position:fixed;bottom:0;left:0;right:0;height:160px;background:linear-gradient(180deg,transparent,var(--wave) 60%,#0d2137);opacity:0.35;animation:wavePulse 4s ease-in-out infinite;pointer-events:none;z-index:0}
  @keyframes wavePulse{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .container{max-width:480px;margin:0 auto;padding:20px 16px 80px;position:relative;z-index:1}
  header{text-align:center;margin-bottom:18px;padding-top:10px}
  .title{font-family:'Bebas Neue',cursive;font-size:44px;letter-spacing:4px;color:var(--sky);text-shadow:0 0 30px rgba(126,200,227,0.5)}
  .subtitle{font-size:11px;color:var(--muted);letter-spacing:3px;margin-top:4px}
  .map-wrapper{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:14px;margin-bottom:18px;overflow:hidden}
  .map-label{font-size:10px;letter-spacing:2px;color:var(--muted);text-align:center;margin-bottom:10px;text-transform:uppercase}
  #map{height:320px;border-radius:12px;z-index:2}
  .hint{text-align:center;font-size:10px;color:var(--muted);margin-top:8px;opacity:0.6}
  .marina-list{display:flex;flex-direction:column;gap:8px}
  .marina-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:12px;transition:all 0.2s}
  .marina-card:hover{background:rgba(126,200,227,0.08);border-color:rgba(126,200,227,0.3);transform:translateX(3px)}
  .m-num{font-family:'Bebas Neue',cursive;font-size:20px;width:22px;flex-shrink:0;text-align:center}
  .m-info{flex:1}
  .m-name{font-size:13px;font-weight:700;margin-bottom:1px}
  .m-loc{font-size:11px;color:var(--muted)}
  .m-arr{color:var(--muted);font-size:14px}

  .region-tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
  .region-tabs::-webkit-scrollbar{display:none}
  .rtab{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:20px;
    color:var(--muted);
    font-family:'Noto Sans JP',sans-serif;
    font-size:12px;
    padding:5px 14px;
    cursor:pointer;
    white-space:nowrap;
    transition:all 0.2s;
    flex-shrink:0;
  }
  .rtab:hover{background:rgba(126,200,227,0.1);color:var(--text)}
  .rtab.active{background:rgba(126,200,227,0.15);border-color:rgba(126,200,227,0.4);color:var(--sky)}

  /* Leafletのポップアップカスタム */
  .leaflet-popup-content-wrapper{
    background:#0d2137 !important;
    border:1px solid rgba(126,200,227,0.4) !important;
    border-radius:12px !important;
    box-shadow:0 4px 20px rgba(0,0,0,0.5) !important;
  }
  .leaflet-popup-tip{background:#0d2137 !important}
  .leaflet-popup-content{margin:10px 14px !important;color:#e8f4fd}
  .popup-name{font-family:'Bebas Neue',cursive;font-size:16px;color:#7ec8e3;letter-spacing:1px;margin-bottom:3px}
  .popup-loc{font-size:11px;color:#7fb3cc;margin-bottom:8px}
  .popup-btn{display:block;background:linear-gradient(135deg,#1a4a7a,#4a9eca);color:white;text-align:center;padding:6px 12px;border-radius:8px;text-decoration:none;font-size:12px;font-weight:700;letter-spacing:1px}
  .popup-btn:hover{background:linear-gradient(135deg,#4a9eca,#7ec8e3)}

  /* 地図タイルを暗くする */
  .leaflet-tile{filter:brightness(0.4) saturate(0.3) hue-rotate(180deg)}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title">⛵ MARINA</div>
    <div class="subtitle">拠点を選んで海況チェック</div>
  </header>

  <div class="map-wrapper">
    <div class="map-label">📍 マリーナ拠点マップ</div>
    <div class="region-tabs" id="regionTabs">
      <button class="rtab active" onclick="zoomRegion('all')">全体</button>
      <button class="rtab" onclick="zoomRegion('kanto')">関東</button>
      <button class="rtab" onclick="zoomRegion('tokai')">東海</button>
      <button class="rtab" onclick="zoomRegion('okinawa')">沖縄</button>
    </div>
    <div id="map"></div>
    <div class="hint">ピンをタップ → 海況チェック</div>
  </div>

  <div class="marina-list" id="marinaList"></div>
</div>

<script>
const MARINAS = [
  {name:'シースタイル平塚',      loc:'神奈川県平塚市',   file:'hiratsuka-weather.html', icon:'⛵', color:'#7ec8e3', lat:35.3261, lng:139.3445},
  {name:'シースタイル芦名',      loc:'神奈川県横須賀市', file:'ashina-weather.html',    icon:'⚓', color:'#4a9eca', lat:35.2758, lng:139.6198},
  {name:'セントラルボート木更津', loc:'千葉県木更津市',   file:'kisarazu-weather.html',  icon:'🚢', color:'#f39c12', lat:35.3718, lng:139.8996},
  {name:'伊東サンライズマリーナ', loc:'静岡県伊東市',     file:'ito-weather.html',       icon:'🌅', color:'#e74c3c', lat:34.9843, lng:139.0945},
  {name:'ヤマハマリーナ沼津',    loc:'静岡県沼津市',     file:'numazu-weather.html',    icon:'🗻', color:'#9b59b6', lat:35.0158, lng:138.8782},
  {name:'マリンランド北谷',      loc:'沖縄県北谷町',     file:'chatan-weather.html',    icon:'🌺', color:'#2ecc71', lat:26.3115, lng:127.7561},
  {name:'沖縄マリーナ（中城）',  loc:'沖縄県中城村',     file:'nakagusuku-weather.html',icon:'🌺', color:'#f39c12', lat:26.3190, lng:127.8290},
  {name:'沖縄マリーナ（泡瀬）',  loc:'沖縄県沖縄市',     file:'awase-weather.html',     icon:'🌺', color:'#e74c3c', lat:26.3380, lng:127.8220},
];

// 地域ズーム
const REGIONS = {
  all:     {center:[34.5, 136.0], zoom:5},
  kanto:   {center:[35.35, 139.6], zoom:9},
  tokai:   {center:[35.0,  138.9], zoom:9},
  okinawa: {center:[26.33, 127.82], zoom:11},
};

function zoomRegion(key){
  const r = REGIONS[key];
  map.flyTo(r.center, r.zoom, {duration:0.8});
  document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
  document.querySelector(`[onclick="zoomRegion('${key}')"]`).classList.add('active');
}

// 地図初期化（日本全体が見える位置）
const map = L.map('map', {
  center: [34.5, 136.0],
  zoom: 5,
  zoomControl: true,
  attributionControl: false,
});

// OpenStreetMapタイル
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
}).addTo(map);

// ピン追加
MARINAS.forEach((m, i) => {
  // カスタムアイコン
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      background:${m.color};
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      width:32px;height:32px;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
      border:2px solid rgba(255,255,255,0.3);
    "><span style="transform:rotate(45deg);font-size:14px">${m.icon}</span></div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -34],
  });

  const marker = L.marker([m.lat, m.lng], {icon}).addTo(map);
  marker.bindPopup(`
    <div class="popup-name">${m.icon} ${m.name}</div>
    <div class="popup-loc">${m.loc}</div>
    <a class="popup-btn" href="${m.file}">🌊 海況チェック →</a>
  `);
});

// リスト生成
const list = document.getElementById('marinaList');
MARINAS.forEach((m, i) => {
  const a = document.createElement('a');
  a.className = 'marina-card';
  a.href = m.file;
  a.innerHTML = `
    <div class="m-num" style="color:${m.color}">${i+1}</div>
    <div class="m-info">
      <div class="m-name">${m.icon} ${m.name}</div>
      <div class="m-loc">${m.loc}</div>
    </div>
    <div class="m-arr">›</div>`;
  list.appendChild(a);
});
</script>
</body>
</html>
