<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海況チェッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{--ocean:#0a1628;--wave:#1a4a7a;--foam:#4a9eca;--sky:#7ec8e3;--go:#2ecc71;--text:#e8f4fd;--muted:#7fb3cc}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--ocean);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;bottom:0;left:0;right:0;height:200px;background:linear-gradient(180deg,transparent,var(--wave) 60%,#0d2137);opacity:0.4;animation:wavePulse 4s ease-in-out infinite;pointer-events:none;z-index:0}
  @keyframes wavePulse{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
  .container{max-width:480px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
  header{text-align:center;margin-bottom:48px}
  .title{font-family:'Bebas Neue',cursive;font-size:48px;letter-spacing:4px;color:var(--sky);text-shadow:0 0 30px rgba(126,200,227,0.5)}
  .subtitle{font-size:12px;color:var(--muted);letter-spacing:3px;margin-top:6px}
  .marina-grid{display:flex;flex-direction:column;gap:16px}
  .marina-card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:24px 20px;
    text-decoration:none;
    color:var(--text);
    display:flex;
    align-items:center;
    gap:20px;
    transition:all 0.3s;
    cursor:pointer;
  }
  .marina-card:hover{
    background:rgba(126,200,227,0.08);
    border-color:rgba(126,200,227,0.4);
    transform:translateY(-3px);
    box-shadow:0 8px 30px rgba(126,200,227,0.15);
  }
  .marina-icon{font-size:48px;flex-shrink:0}
  .marina-info{flex:1}
  .marina-name{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:2px;color:var(--sky);margin-bottom:4px}
  .marina-location{font-size:12px;color:var(--muted);margin-bottom:6px}
  .marina-area{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(126,200,227,0.6)}
  .arrow{font-size:20px;color:var(--muted);flex-shrink:0}
  .version-note{text-align:center;font-size:11px;color:var(--muted);margin-top:32px;opacity:0.6}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title">⛵ MARINA</div>
    <div class="subtitle">海況チェッカー — 拠点を選んでください</div>
  </header>
  <div class="marina-grid">
    <a class="marina-card" href="https://hswtnb-blip.github.io/hiratsuka">
      <div class="marina-icon">🌊</div>
      <div class="marina-info">
        <div class="marina-name">シースタイル平塚</div>
        <div class="marina-location">神奈川県平塚市</div>
        <div class="marina-area">HIRATSUKA · 相模湾</div>
      </div>
      <div class="arrow">›</div>
    </a>
    <a class="marina-card" href="ashina-weather.html">
      <div class="marina-icon">⚓</div>
      <div class="marina-info">
        <div class="marina-name">シースタイル芦名</div>
        <div class="marina-location">神奈川県横須賀市</div>
        <div class="marina-area">ASHINA · 相模湾</div>
      </div>
      <div class="arrow">›</div>
    </a>
    <a class="marina-card" href="kisarazu-weather.html">
      <div class="marina-icon">🚢</div>
      <div class="marina-info">
        <div class="marina-name">セントラルボート木更津</div>
        <div class="marina-location">千葉県木更津市</div>
        <div class="marina-area">KISARAZU · 東京湾</div>
      </div>
      <div class="arrow">›</div>
    </a>
    <a class="marina-card" href="ito-weather.html">
      <div class="marina-icon">🌅</div>
      <div class="marina-info">
        <div class="marina-name">伊東サンライズマリーナ</div>
        <div class="marina-location">静岡県伊東市</div>
        <div class="marina-area">ITO · 相模湾</div>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>
  <div class="version-note">潮汐データは3月分のみ対応</div>
</div>
</body>
</html>
